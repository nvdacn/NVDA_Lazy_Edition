name: Build NVDA Lazy Edition

on:
  push:
    tags:
      - "*"
    branches:
      - master
      - "try-**"
  pull_request:
    branches:
      - "*"
  workflow_dispatch:

jobs:
  download-files:
    name: Download ${{ matrix.file.Name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        file:
          - Name: vocalizer_expressive2_driver.nvda-addon
            URL: https://dl.nvdacn.com/NVDA-Addons/TTS/Vocalizer2.2Mod/vocalizer_expressive2_driver-2026.5.15.nvda-addon
            sha256: 55a922fbd37e6ce671f40514bf499c00be5357fd25f4d70c786a0fb938d48194
          - Name: vocalizer-expressive2-voice-zh-en-Compact-2.2.nvda-addon
            URL: https://dl.nvdacn.com/NVDA-Addons/TTS/Vocalizer2.2Mod/vocalizer-expressive2-voice-zh-en-Compact-2.2.nvda-addon
            sha256: 0068fe40392dbe9339c84536dffd54641ff54ab37af7044d64d4653ff0335073
          - Name: spchapi.exe
            URL: https://dl.nvdacn.com/NVDA-Addons/TTS/spchapi.exe
            sha256: 4fe6f9be7a75d649e2d484069c3626d30345e746e565f0b7b1fcff34ef223a2c
            prefix: speech-
          - Name: IBM_ViaVoice_TTS_Runtime.exe
            URL: https://dl.nvdacn.com/NVDA-Addons/TTS/IBMViaVoiceTTSRuntime.exe
            sha256: 0f9e8a998f0bf62513961fe0cb68bc50e06440a6d8e45e8ce6e073e332104255
            prefix: speech-
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Download ${{ matrix.file.Name }}
        uses: ./.github/actions/DownloadResource
        with:
          file-name: ${{ matrix.file.Name }}
          file-url: ${{ matrix.file.URL }}
          file-sha256: ${{ matrix.file.sha256 }}
          prefix: ${{ matrix.file.prefix }}

  download-addons-from-addonStore:
    name: Download ${{ matrix.addon.addonId }} from Addon Store
    runs-on: ubuntu-latest
    strategy:
      matrix:
        addon:
          - addonId: Access8Math
          - addonId: addonsHelp
          - addonId: addonsTools
          - addonId: AiSound5
          - addonId: audioManager
          - addonId: clipboardEnhancement
          - addonId: DragAndDrop
            channel: dev
          - addonId: goldenCursor
          - addonId: ime_expressive
          - addonId: inputLock
          - addonId: instantTranslate
          - addonId: leanCalendar
          - addonId: numberProcessing
          - addonId: objWatcher
          - addonId: QQEnhancement
          - addonId: resourceMonitor
          - addonId: unmute
            channel: beta
          - addonId: WeChatEnhancement
          - addonId: winFormsNet48Fixes
          - addonId: withSounds
          - addonId: xyOCR
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Download ${{ matrix.addon.addonId }}
        uses: ./.github/actions/DownloadResource
        with:
          from-addonStore: true
          addon-ID: ${{ matrix.addon.addonId }}
          addon-channel: ${{ matrix.addon.channel && matrix.addon.channel || 'stable' }}

  download-NVDA:
    name: Download NVDA
    runs-on: ubuntu-latest
    outputs:
      NVDAFilename: nvda_${{ steps.get-release.outputs.nvda-version }}.exe
      NVDAVersion: ${{ steps.get-release.outputs.nvda-version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Get NVDA release info
        id: get-release
        run: |
          RELEASE_JSON=$(gh release list --repo nvaccess/nvda --limit 1 \
            --json tagName,isPrerelease,name,assets \
            --jq ".[] | select(.isPrerelease == ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && !contains(github.ref, 'beta') && 'false' || 'true' }})")
          NVDA_VERSION=$(echo "$RELEASE_JSON" | jq -r '.name' | sed 's/^release-//')
          DOWNLOAD_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | test("\\.exe$") and ( .name | test("nvda_") ) ) | .url')
          SHA256=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | test("\\.exe$") and ( .name | test("nvda_") ) ) | .sha256')
          echo "nvda-version=$NVDA_VERSION" >> $GITHUB_OUTPUT
          echo "download-url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Download NVDA installer
        uses: ./.github/actions/DownloadResource
        with:
          file-name: nvda_${{ steps.get-release.outputs.nvda-version }}.exe
          file-url: ${{ steps.get-release.outputs.download-url }}
          file-sha256: ${{ steps.get-release.outputs.sha256 }}

  build:
    name: Build NVDA Lazy Edition
    runs-on: windows-latest
    needs:
      - download-NVDA
      - download-files
      - download-addons-from-addonStore
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Download ${{ needs.download-NVDA.outputs.NVDAFilename }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.download-NVDA.outputs.NVDAFilename }}
          path: ${{ github.workspace }}/Resource/
      - name: Download Speech
        uses: actions/download-artifact@v8
        with:
          path: ${{ github.workspace }}/Resource/speech/
          pattern: speech-*
          merge-multiple: true
      - name: Download Addons
        uses: actions/download-artifact@v8
        with:
          path: ${{ github.workspace }}/Resource/Addons/
          pattern: "*.nvda-addon"
          merge-multiple: true
      - name: Download ChineseSimplified.isl
        uses: carlosperate/download-file-action@v2
        with:
          file-url: 'https://raw.githubusercontent.com/kira-96/Inno-Setup-Chinese-Simplified-Translation/main/ChineseSimplified.isl'
          location: '${{ github.workspace }}/Resource/UILanguages'
      - name: Run the build script
        run: |
          tzutil /s "China Standard Time"
          ${{ github.workspace }}/Run.bat Build
        env:
          NVDAVersion: ${{ needs.download-NVDA.outputs.NVDAVersion }}
          BetaVersion: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && !contains(github.ref, 'beta') && 'False' || 'True' }}
          CreateArchive: ${{ startsWith(github.ref, 'refs/tags/') && 'True' || 'False' }}
      - name: Upload NVDA_Lazy_Edition
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v7
        with:
          path: ${{ github.workspace }}/Build/NVDA_${{ env.NVDAVersion }}*.exe
          archive: false
      - name: Upload RestoreNVDAConfigurationTool
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v7
        with:
          path: '${{ github.workspace }}/Build/NVDA 配置恢复工具.exe'
          archive: false
      - name: Upload Resource
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v7
        with:
          name: Resource
          path: ${{ github.workspace }}/Resource
          compression-level: 0
      - name: Upload Archive
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v7
        with:
          name: Archive
          path: ${{ github.workspace }}/Build/Archive/*
          compression-level: 0

  github_release:
    name: Create Release on GitHUB
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download Archive
        uses: actions/download-artifact@v8
        with:
          name: Archive
          path: NVDA_Lazy_Edition
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          body: 详细更新日志请[点此查看](documentation/changes.md)。
          files: NVDA_Lazy_Edition/*
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref, 'beta') }}

  gitcode_push:
    name: Push to GitCode
    if: ${{ startsWith(github.ref, 'refs/tags/') && vars.GITCODE_USERNAME }}
    uses: nvdacn/sync_to_gitcode/.github/workflows/PushToGitCode.yaml@master
    with:
      gitcode_username: ${{ vars.GITCODE_USERNAME }}
      gitcode_repository: ${{ vars.GITCODE_REPOSITORY }}
    secrets:
      GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}

  gitcode_release:
    name: Create Release on GitCode
    needs: 
      - gitcode_push
      - build
    uses: nvdacn/sync_to_gitcode/.github/workflows/CreateReleaseOnGitCode.yaml@master
    with:
      artifact_name: Archive
      gitcode_repository: ${{ vars.GITCODE_REPOSITORY }}
      tag_name: ${{ github.ref_name }}
      prerelease: ${{ contains(github.ref, 'beta') }}
      body: |
        详细更新日志请[点此查看](https://gitcode.com/${{ vars.GITCODE_REPOSITORY }}/blob/${{ github.ref_name }}/documentation/changes.md)。
      file_name: NVDA_Lazy_Edition*.zip
    secrets:
      GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
