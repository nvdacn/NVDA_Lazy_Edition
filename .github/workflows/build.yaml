name: Build NVDA Lazy Edition

on:
  push:
    tags:
      - "*"
    branches:
      - master
      - "try-**"
  pull_request:
    branches:
      - "*"
  workflow_dispatch:

env:
  BetaVersion: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && !contains(github.ref, 'beta') && 'False' || 'True' }}

jobs:
  download-files:
    name: Download ${{ matrix.file.Name }}
    strategy:
      matrix:
        file:
          - Name: vocalizer_expressive2_driver.nvda-addon
            URL: https://gitcode.com/nvdacn/NVDA_resource_files/releases/download/vocalizer_expressive2_driver-2026.6.6-2606131647/vocalizer_expressive2_driver-2026.6.6.nvda-addon
            sha256: E52E0A6CFA1714E217E988F27007EF2E1757706C872877117076233D52D6E98B
          - Name: vocalizer-expressive2-voice-zh-en-Compact-2.2.nvda-addon
            URL: https://gitcode.com/nvdacn/NVDA_resource_files/releases/download/vocalizer-expressive2-voice-zh-en-Compact-2.2-2606131654/vocalizer-expressive2-voice-zh-en-Compact-2.2.nvda-addon
            sha256: 0068fe40392dbe9339c84536dffd54641ff54ab37af7044d64d4653ff0335073
          - Name: spchapi.exe
            URL: https://gitcode.com/nvdacn/NVDA_resource_files/releases/download/spchapi-2606131658/spchapi.exe
            sha256: 4fe6f9be7a75d649e2d484069c3626d30345e746e565f0b7b1fcff34ef223a2c
            prefix: speech-
          - Name: IBM_ViaVoice_TTS_Runtime.exe
            URL: https://gitcode.com/nvdacn/NVDA_resource_files/releases/download/IBM_ViaVoice_TTS_Runtime-2606131657/IBM_ViaVoice_TTS_Runtime.exe
            sha256: 0f9e8a998f0bf62513961fe0cb68bc50e06440a6d8e45e8ce6e073e332104255
            prefix: speech-
    uses: ./.github/workflows/DownloadResource.yaml
    with:
      file-name: ${{ matrix.file.Name }}
      file-url: ${{ matrix.file.URL }}
      file-sha256: ${{ matrix.file.sha256 }}
      prefix: ${{ matrix.file.prefix }}

  download-addons-from-addonStore:
    name: Download ${{ matrix.addon.addonId }} from Addon Store
    strategy:
      matrix:
        addon:
          - addonId: Access8Math
          - addonId: addonsHelp
          - addonId: addonsTools
          - addonId: AiSound5
          - addonId: audioManager
          - addonId: clipboardEnhancement
          - addonId: DragAndDrop
            channel: dev
          - addonId: goldenCursor
          - addonId: ime_expressive
          - addonId: inputLock
          - addonId: leanCalendar
          - addonId: numberProcessing
          - addonId: objWatcher
          - addonId: polyglot
          - addonId: QQEnhancement
          - addonId: resourceMonitor
          - addonId: unmute
            channel: beta
          - addonId: WeChatEnhancement
          - addonId: winFormsNet48Fixes
          - addonId: withSounds
          - addonId: xyOCR
    uses: ./.github/workflows/DownloadResource.yaml
    with:
      from-addonStore: true
      addon-ID: ${{ matrix.addon.addonId }}
      addon-channel: ${{ matrix.addon.channel || 'stable' }}

  get-NVDA-release:
    name: Get NVDA release info
    runs-on: ubuntu-latest
    outputs:
      NVDAFilename: ${{ steps.get-release.outputs.nvda-filename }}
      NVDAVersion: ${{ steps.get-release.outputs.nvda-version }}
      download-url: ${{ steps.get-release.outputs.download-url }}
    steps:
      - name: Get NVDA release info
        id: get-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          exclude_flags=(--exclude-drafts)
          if [ "$BetaVersion" != "True" ]; then
            exclude_flags+=(--exclude-pre-releases)
          fi
          tagName=$(gh release list --repo nvaccess/nvda --limit 1 "${exclude_flags[@]}" --json tagName --jq '.[0].tagName')
          NVDAVersion="${tagName#release-}"
          NVDAFilename="nvda_$NVDAVersion.exe"
          echo "nvda-filename=$NVDAFilename" >> $GITHUB_OUTPUT
          echo "nvda-version=$NVDAVersion" >> $GITHUB_OUTPUT
          echo "download-url=https://download.nvaccess.org/releases/$NVDAVersion/$NVDAFilename" >> $GITHUB_OUTPUT

  download-NVDA:
    name: Download NVDA
    needs: get-NVDA-release
    uses: ./.github/workflows/DownloadResource.yaml
    with:
      file-name: ${{ needs.get-NVDA-release.outputs.NVDAFilename }}
      file-url: ${{ needs.get-NVDA-release.outputs.download-url }}

  build:
    name: Build NVDA Lazy Edition
    runs-on: windows-latest
    needs:
      - download-files
      - download-addons-from-addonStore
      - get-NVDA-release
      - download-NVDA
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Download NVDA installer
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.get-NVDA-release.outputs.NVDAFilename }}
          path: ${{ github.workspace }}/Resource/
      - name: Download Speech
        uses: actions/download-artifact@v8
        with:
          path: ${{ github.workspace }}/Resource/speech/
          pattern: speech-*
          merge-multiple: true
      - name: Download Addons
        uses: actions/download-artifact@v8
        with:
          path: ${{ github.workspace }}/Resource/Addons/
          pattern: "*.nvda-addon"
          merge-multiple: true
      - name: Download ChineseSimplified.isl
        uses: carlosperate/download-file-action@v2
        with:
          file-url: 'https://raw.githubusercontent.com/kira-96/Inno-Setup-Chinese-Simplified-Translation/main/ChineseSimplified.isl'
          location: '${{ github.workspace }}/Resource/UILanguages'
      - name: Run the build script
        run: |
          tzutil /s "China Standard Time"
          ${{ github.workspace }}/Run.bat Build
        env:
          NVDAVersion: ${{ needs.get-NVDA-release.outputs.NVDAVersion }}
          CreateArchive: ${{ startsWith(github.ref, 'refs/tags/') && 'True' || 'False' }}
      - name: Upload NVDA_Lazy_Edition
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v7
        with:
          path: ${{ github.workspace }}/Build/NVDA_${{ env.NVDAVersion }}*.exe
          archive: false
      - name: Upload RestoreNVDAConfigurationTool
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v7
        with:
          path: '${{ github.workspace }}/Build/NVDA 配置恢复工具.exe'
          archive: false
      - name: Upload Resource
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v7
        with:
          name: Resource
          path: ${{ github.workspace }}/Resource
          compression-level: 0
      - name: Upload Archive
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v7
        with:
          name: Archive
          path: ${{ github.workspace }}/Build/Archive/*
          compression-level: 0

  github_release:
    name: Create Release on GitHUB
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download Archive
        uses: actions/download-artifact@v8
        with:
          name: Archive
          path: NVDA_Lazy_Edition
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          body: 详细更新日志请[点此查看](documentation/changes.md)。
          files: NVDA_Lazy_Edition/*
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref, 'beta') }}

  gitcode_push:
    name: Push to GitCode
    if: ${{ startsWith(github.ref, 'refs/tags/') && vars.GITCODE_USERNAME }}
    uses: nvdacn/sync_to_gitcode/.github/workflows/PushToGitCode.yaml@master
    with:
      gitcode_username: ${{ vars.GITCODE_USERNAME }}
      gitcode_repository: ${{ vars.GITCODE_REPOSITORY }}
    secrets:
      GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}

  gitcode_release:
    name: Create Release on GitCode
    needs: 
      - gitcode_push
      - build
    uses: nvdacn/sync_to_gitcode/.github/workflows/CreateReleaseOnGitCode.yaml@master
    with:
      artifact_name: Archive
      gitcode_repository: ${{ vars.GITCODE_REPOSITORY }}
      tag_name: ${{ github.ref_name }}
      prerelease: ${{ contains(github.ref, 'beta') }}
      body: |
        详细更新日志请[点此查看](https://gitcode.com/${{ vars.GITCODE_REPOSITORY }}/blob/${{ github.ref_name }}/documentation/changes.md)。
      file_name: NVDA_Lazy_Edition*.zip
    secrets:
      GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
